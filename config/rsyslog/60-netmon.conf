# NetMon - Receive syslog from Omada router
# Load UDP input module
module(load="imudp")
input(type="imudp" port="5514" address="0.0.0.0")

# Route messages from the router to a dedicated file
if $fromhost-ip == '192.168.0.1' then {
    action(type="omfile" file="/var/log/netmon/router.log"
           template="RSYSLOG_TraditionalFileFormat")
    stop
}

# Catch-all for other syslog sources on this port
if $inputname == 'imudp' then {
    action(type="omfile" file="/var/log/netmon/other.log"
           template="RSYSLOG_TraditionalFileFormat")
    stop
}
