# NetMon - Coworking Network Monitor Configuration
# Edit this file and restart the relevant service to apply changes.

# ---------------------------------------------------------------------------
# Active network profile
# ---------------------------------------------------------------------------
# Which network the Pi is currently joined to. Different SSIDs in the building
# correspond to completely different topologies (Omada-mesh vs direct-wired AP),
# so per-profile we customize: gateway IP, whether to scrape Omada gear, etc.
# Switch via `scripts/switch_profile.sh <name>` (logs the event + restarts svcs).
active_profile: "eito_plus"

# Per-profile config — only the active one is consulted; the others are kept
# here so switching back is a single line edit.
profiles:
  eito:
    description: "Omada multi-AP mesh (planta-baja + planta-1 + ER706W gateway)"
    client_interface: "wlan0"         # the Pi's WiFi adapter to use as the station on this network
    gateway: "192.168.0.1"            # ping target — the local L3 next hop
    eap_mesh: "192.168.0.100"         # optional second LAN target (the AP we mesh through)
    omada:
      enabled: true                   # gates router/eap/syslog/wan_ping scrapers
      eap_hosts:                      # APs scraped by eap_monitor (SSH)
        - { host: "192.168.0.100", name: "planta-baja" }
        - { host: "192.168.0.101", name: "planta-1" }
    monitor:                          # passive RF environment scanning (wifi_scanner)
      enabled: false                  # baseline captured 2026-05-20; see docs/wifi-environment-baseline.md
      interface: "wlan1"              # Realtek RTW8822BU — only interface that supports monitor mode
      interval: 60                    # seconds between full channel sweeps (was 300 historically;
                                      # 60 = 5× denser sampling when we re-enable for an investigation)

  eito_plus:
    description: "Single Ubiquiti U6-Pro wired directly to Movistar router (no Omada involvement)"
    client_interface: "wlan1"         # USB Realtek RTW8822BU — the only adapter that can see Eito_plus 5 GHz
    gateway: "192.168.1.1"            # Movistar router on its own subnet
    eap_mesh: null                    # no equivalent in this topology
    omada:
      enabled: false                  # all Omada scrapers idle on this profile
    monitor:
      enabled: false                  # wlan1 freed up to be the client on Eito_plus
      interface: "wlan1"              # (unused when enabled=false, kept for symmetry)
      interval: 60                    # (same default — used when monitor is re-enabled)

# InfluxDB connection (tokens are in secrets.env, loaded via systemd)
influxdb:
  url: "http://127.0.0.1:8086"
  org: "netmon"
  bucket: "netmon"
  bucket_speedtest: "netmon_speedtest"

# Ping monitoring targets
# Layered diagnosis: each target isolates a different segment of the path.
#   - gateway (router LAN):   if spike here -> WiFi / Pi local
#   - eap (mesh AP):          if spike here only -> mesh backhaul
#   - cloudflare / google:    if spike here only -> router or WAN
ping:
  interval: 0           # seconds between batches (0 = back-to-back, true continuous)
  count: 5              # pings per target per batch (5 samples @ 1Hz = 5s window)
  period_ms: 1000       # ms between pings to the same target (1Hz)
  inter_target_ms: 50   # ms between probes to different targets within a round
  rtt_threshold_ms: 200 # any single RTT >= this triggers a ping_incident
  # Incident-detector knobs. Tuned 2026-05-20 after finding ~80% of incidents
  # were either single-packet drops (WiFi background noise) or storms during
  # config changes / speedtest+iperf3 runs (self-induced contention).
  loss_min_packets: 2          # need >= N lost packets out of `count` to fire a 'loss' incident
                               # (1/5 = 20% loss is WiFi baseline; 2/5 = 40% is real)
  event_settle_seconds: 90     # after a netmon_event with category in {config, hw},
                               # tag incidents as synthetic=true for N seconds
                               # (clients reroam/re-associate immediately after a config change)
  test_marker_max_age_seconds: 180  # ignore /run/netmon/test_running if its mtime is older than this
                                    # (safety: avoids permanent synthetic-tagging if a test crashed
                                    #  before removing its marker; longest test is ~120s + buffer)
  # Layered diagnosis with redundancy on the internet side:
  #   - gateway:  Pi -> router (catches WiFi/LAN) — comes from active profile
  #   - eap_mesh: Pi -> AP (catches mesh backhaul) — comes from active profile (null on eito_plus)
  #   - five internet targets across providers (Cloudflare, Google, Quad9, Level3):
  #     the Omada load balancer (4:2 Movistar:Orange) will hash flows across WANs,
  #     so if a subset of internet targets degrades while the rest are fine,
  #     one WAN is likely the culprit even though we can't directly isolate it.
  # Profile-specific gateway + eap_mesh targets are merged in by ping_monitor
  # at runtime from `profiles.<active_profile>.{gateway,eap_mesh}`.
  targets:
    dns_cloudflare: "1.1.1.1"
    dns_cloudflare2: "1.0.0.1"
    dns_google: "8.8.8.8"
    dns_quad9: "9.9.9.9"
    dns_level3: "4.2.2.2"

# Public IP change detection
ip_check:
  interval: 60        # seconds between checks
  services:
    - "https://ifconfig.me/ip"
    - "https://api.ipify.org"
    - "https://checkip.amazonaws.com"

# Speedtest
speedtest:
  # The timer fires every 5 min; speedtest_runner.py decides whether to run
  # based on the schedule below. A test saturates the WAN for ~20s, so the
  # work window is intentionally sparse and predictable; the night window is
  # aggressive because nobody is there.
  timeout: 120
  schedules:
    work:    { window: "09:00-17:00", every_min: 180 }  # 3 tests/day during work hours
    evening: { window: "17:00-22:00", every_min: 60 }   # hourly as the office empties
    night:   { window: "22:00-09:00", every_min: 15 }   # aggressive while idle
  # Pinned servers — speedtest_runner.py picks one at random each run. Picked
  # by scripts/speedtest_benchmark.py on 2026-05-20 across the closest 10
  # Ookla servers. Leave empty to let speedtest-cli auto-pick (NOT recommended —
  # historically lands on bandwidth-capped servers like the now-retired id=1680
  # 'Madrid' that returned ~10 Mbps regardless of link capacity).
  servers:
    - 14979   # Orange, Madrid — best download (60.8 Mbps in benchmark)
    - 44255   # Citelia, Madrid — best upload (105.8) + lowest latency (31.5 ms)
    - 63275   # Jazztel, Valladolid — geographic diversity

# WiFi client monitoring (wlan0)
wifi_station:
  interval: 30        # seconds
  interface: "wlan0"

# WiFi channel scanning (wlan1, monitor mode)
wifi_scanner:
  interval: 300       # seconds (5 minutes)
  interface: "wlan1"

# BSSID -> friendly location label.
# Lookup is case-insensitive; collectors lowercase the BSSID before matching.
# Each TP-Link Omada EAP610 exposes two BSSIDs (2.4 GHz = base MAC, 5 GHz = base+1).
# Unknown BSSIDs are tagged ap_location="unknown" so new/rogue APs stand out.
ap_labels:
  "10:5a:95:f5:82:1a": "planta-baja"   # EAP610 2.4 GHz
  "10:5a:95:f5:82:1b": "planta-baja"   # EAP610 5 GHz
  "10:5a:95:f5:67:68": "planta-1"      # EAP610 2.4 GHz
  "10:5a:95:f5:67:69": "planta-1"      # EAP610 5 GHz
  "0c:ef:15:da:81:63": "router"        # Omada gateway; should NOT broadcast eito
  "72:63:f8:28:57:ca": "ubiquiti u6pro"  # U6-Pro 2.4 GHz (Eito_plus, ch 11)
  "76:63:f8:28:57:cb": "ubiquiti u6pro"  # U6-Pro 5 GHz primary (Eito_plus, ch 149)
  "6c:63:f8:28:57:ca": "ubiquiti u6pro"  # U6-Pro 2.4 GHz secondary/hidden BSSID
  "6c:63:f8:28:57:cb": "ubiquiti u6pro"  # U6-Pro 5 GHz secondary/hidden BSSID
  "72:63:f8:28:57:cb": "ubiquiti u6pro"  # U6-Pro 5 GHz extra BSSID (visitor/guest SSID variant)

# Omada Router SSH monitoring
# Set ROUTER_SSH and ROUTER_SSH_PASSWORD in secrets.env
# The router_monitor.py script polls WAN port status and system info via SSH
router:
  interval: 60          # seconds between WAN status polls
  sysinfo_interval: 1   # poll system info every Nth cycle (1 = every 60s)
  ssh_port: 2222        # Omada Cloud site-wide SSH port (default 22 was changed)

# Router-side ping diagnostics (triggered by ping_monitor incidents).
# The Omada CLI on this firmware accepts ONLY `ping <ip>` (no -I, -c, -W),
# so per-WAN isolation is not possible — true per-WAN ping would require
# reverse-engineering the Omada local web API. This still gives us
# router-side latency to correlate against Pi-side latency for incident
# attribution (Pi-to-router vs upstream-of-router).
wan_ping:
  enabled: true
  targets: ["8.8.8.8", "1.1.1.1"]   # router pings each target (4 packets each)
  min_interval: 30                  # seconds; rate-limit so we don't flood SSH

# EAP610 mesh AP monitoring via SSH — Omada-only (gated by active profile's `omada.enabled`)
# SSH must be enabled site-wide in Omada controller:
#   Settings -> Site -> Services -> Device Account & SSH
# Credentials default to ROUTER_SSH_* (same site account); override with EAP_SSH_* in secrets.env
# The host list lives on the active profile (`profiles.<name>.omada.eap_hosts`).
eap:
  interval: 60
  ssh_port: 2222        # Omada site-wide SSH port (same as router)

# Syslog receiver (for Omada router logs)
syslog:
  bind_address: "0.0.0.0"
  bind_port: 5514
  # Configure your Omada router to send syslog to <Pi-IP>:5514

# SNMP polling (optional, disabled by default)
snmp:
  enabled: false
  community: "public"
  host: "192.168.0.1"
  interval: 60        # seconds
  # Standard OIDs for interface counters
  oids:
    uptime: "1.3.6.1.2.1.1.3.0"
    if_in_octets_wan1: "1.3.6.1.2.1.2.2.1.10.2"
    if_out_octets_wan1: "1.3.6.1.2.1.2.2.1.16.2"
    if_in_octets_wan2: "1.3.6.1.2.1.2.2.1.10.3"
    if_out_octets_wan2: "1.3.6.1.2.1.2.2.1.16.3"

# iperf3 load simulation
# IMPORTANT: schedule is controlled by systemd/netmon-iperf3.timer (every 30 min by default),
# not by this file. To change the schedule, edit the .timer unit and run install.sh.
iperf3:
  # Pool of public iperf3 servers — the simulator picks one at random per run,
  # falling back to the next if the chosen server is busy (public iperf3 servers
  # only accept one client per port at a time). Picked 2026-05-20 by probing
  # ~30 EU candidates and keeping the survivors that pass both TCP ≥15 Mbps and
  # a UDP 5×3M test. Diversity here is what keeps "server is having a bad
  # afternoon" from looking like "the Eito WAN is broken":
  #   - moji.fr        — Paris, AS200780 (Moji)        — baseline ~0.74 ms jitter
  #   - ping.online.net— Paris, AS12876  (Scaleway)    — baseline tbd
  #   - clouvider.net  — Frankfurt, AS62240 (Clouvider)— baseline ~1.43 ms jitter
  # Public-server etiquette: keep total bw ~= 15 Mbps and duration <= 30s.
  servers:
    - { host: "iperf3.moji.fr",              port: 5200 }
    - { host: "ping.online.net",             port: 5202 }
    - { host: "fra.speedtest.clouvider.net", port: 5201 }

  # Test profile: 5 simultaneous UDP streams at 3 Mbps each = 15 Mbps total.
  # Approximates "5 simultaneous HD video calls" per the diagnosis brief —
  # enough load to provoke jitter/loss on a degraded WAN without saturating it.
  duration: 30            # seconds per test run
  bandwidth: "3M"         # per-stream UDP bandwidth (3 Mbps ~= 1 HD video call)
  parallel: 5             # number of simultaneous streams

# Alert thresholds (used by Grafana alert rules)
thresholds:
  latency_warn_ms: 100
  latency_crit_ms: 300
  jitter_warn_ms: 30
  loss_warn_pct: 1
  loss_crit_pct: 5
  wifi_signal_warn_dbm: -75
  wifi_signal_crit_dbm: -85
  speedtest_min_download_mbps: 50
  speedtest_min_upload_mbps: 20
  rpi_temp_warn_c: 70
  rpi_disk_warn_pct: 85
