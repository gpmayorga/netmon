apiVersion: 1

# NetMon does not send external notifications — we surface alerts only in
# the Grafana UI. This webhook points at a closed local port so any send
# attempt fails fast without spamming Grafana logs with SMTP errors.

contactPoints:
  - orgId: 1
    name: netmon-discard
    receivers:
      - uid: netmon-discard-recv
        type: webhook
        disableResolveMessage: true
        settings:
          url: http://127.0.0.1:1/netmon-discard
          httpMethod: POST

policies:
  - orgId: 1
    receiver: netmon-discard
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
