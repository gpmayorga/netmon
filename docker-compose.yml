services:
  influxdb:
    image: influxdb:2.7-alpine
    container_name: netmon-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - /opt/netmon/data/influxdb:/var/lib/influxdb2
      - /opt/netmon/data/influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
      - INFLUXD_STORAGE_CACHE_MAX_MEMORY_SIZE=256000000
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - netmon

  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: netmon-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /opt/netmon/data/grafana:/var/lib/grafana
      - /opt/netmon/config/grafana/provisioning:/etc/grafana/provisioning:ro
      - /opt/netmon/config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /opt/netmon/config/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=
      - INFLUX_TOKEN=${INFLUX_TOKEN}
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - netmon

networks:
  netmon:
    driver: bridge
